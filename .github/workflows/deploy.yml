name: E2E Regression and Deployment Pipeline

on:
  push:
    branches: [ "main" ]  # Triggers the pipeline every time you push to main

jobs:
  # STAGE 1: REGRESSION TESTING
  regression-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node/Python
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Change to actions/setup-python if using Python

      - name: Install Dependencies
        run: npm install  # Change to 'pip install -r requirements.txt' if using Python

      - name: Run Regression Pack
        run: npm test     # Change to your actual testing command (e.g., 'pytest')

  # STAGE 2: BUILD & PUSH TO AWS (Only runs if tests pass!)
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: regression-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: qautomation_sandbox_app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
